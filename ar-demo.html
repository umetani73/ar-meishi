<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR名刺デモ</title>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif; }

    #ui-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    #top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 16px 20px 12px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #top-bar .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #fff;
      text-transform: uppercase;
      opacity: 0.9;
    }

    #top-bar .badge {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 2px 8px;
      border-radius: 20px;
    }

    #scan-hint {
      position: absolute;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    #scan-hint .hint-frame {
      width: 200px;
      height: 130px;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 12px;
      margin: 0 auto 14px;
      position: relative;
      animation: pulse-border 2s ease-in-out infinite;
    }

    #scan-hint .hint-frame::before,
    #scan-hint .hint-frame::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      border-color: #fff;
      border-style: solid;
    }

    #scan-hint .hint-frame::before {
      top: -2px; left: -2px;
      border-width: 3px 0 0 3px;
      border-radius: 10px 0 0 0;
    }

    #scan-hint .hint-frame::after {
      bottom: -2px; right: -2px;
      border-width: 0 3px 3px 0;
      border-radius: 0 0 10px 0;
    }

    #scan-hint .hint-text {
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.05em;
      line-height: 1.6;
    }

    #scan-hint.hidden {
      opacity: 0;
    }

    #product-card {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 20px 24px 36px;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 60%, transparent);
      transform: translateY(20px);
      opacity: 0;
      transition: all 0.5s ease;
      pointer-events: none;
    }

    #product-card.visible {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    #product-card .product-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    #product-card .product-name {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
      letter-spacing: 0.02em;
    }

    #product-card .product-desc {
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      margin-bottom: 16px;
      line-height: 1.6;
    }

    #product-card .btn-row {
      display: flex;
      gap: 10px;
    }

    #product-card .btn-primary {
      flex: 1;
      padding: 12px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      pointer-events: auto;
    }

    #product-card .btn-secondary {
      padding: 12px 16px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      pointer-events: auto;
    }

    #loading-screen {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.6s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: #fff;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .loading-bar-wrap {
      width: 160px;
      height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .loading-bar {
      height: 100%;
      background: #fff;
      border-radius: 2px;
      animation: loading 2.5s ease forwards;
    }

    .loading-text {
      font-size: 11px;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
    }

    @keyframes loading {
      0%   { width: 0%; }
      60%  { width: 80%; }
      100% { width: 100%; }
    }

    @keyframes pulse-border {
      0%, 100% { border-color: rgba(255,255,255,0.35); }
      50%       { border-color: rgba(255,255,255,0.8); }
    }
  </style>
</head>
<body>

  <!-- ローディング画面 -->
  <div id="loading-screen">
    <div class="loading-logo">AR MEISHI</div>
    <div class="loading-bar-wrap">
      <div class="loading-bar"></div>
    </div>
    <div class="loading-text">カメラを起動しています...</div>
  </div>

  <!-- UIオーバーレイ -->
  <div id="ui-overlay">
    <div id="top-bar">
      <div class="logo">AR Meishi</div>
      <div class="badge">Demo</div>
    </div>

    <!-- スキャン誘導 -->
    <div id="scan-hint">
      <div class="hint-frame"></div>
      <div class="hint-text">
        名刺のQRマーカーを<br>カメラに向けてください
      </div>
    </div>

    <!-- 商品情報カード -->
    <div id="product-card">
      <div class="product-label">Product</div>
      <div class="product-name" id="product-name">商品名</div>
      <div class="product-desc" id="product-desc">商品の説明文がここに表示されます。</div>
      <div class="btn-row">
        <button class="btn-primary" onclick="alert('詳細ページへ')">詳細を見る</button>
        <button class="btn-secondary" onclick="alert('保存しました')">保存</button>
      </div>
    </div>
  </div>

  <!-- Mind AR シーン -->
  <a-scene
    mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind; autoStart: true; uiLoading: no; uiScanning: no; uiError: no;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <!--
        ★ ここにSketchUpから変換した.glbファイルのURLを設定してください
        例: <a-asset-item id="model" src="https://your-storage.com/your-model.glb"></a-asset-item>

        テスト用にサンプルモデルを使用しています（Duck）
      -->
      <a-asset-item id="model" src="https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models@master/2.0/Duck/glTF-Binary/Duck.glb"></a-asset-item>
    </a-assets>

    <a-camera></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <!--
        ★ 3Dモデルの表示設定
        position: X Y Z（名刺の上に浮かぶ位置）
        scale: 大きさ（モデルに合わせて調整）
        rotation: 向き
      -->
      <a-gltf-model
        id="ar-model"
        src="#model"
        position="0 0.1 0"
        scale="0.5 0.5 0.5"
        rotation="0 0 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear"
      ></a-gltf-model>
    </a-entity>
  </a-scene>

  <script>
    // 商品情報（実際はAPIから取得する想定）
    const products = {
      0: {
        name: "クロワッサン",
        desc: "バター香るサクサクのクロワッサン。毎朝焼きたてをご提供しています。",
      }
    };

    const loadingScreen = document.getElementById('loading-screen');
    const scanHint = document.getElementById('scan-hint');
    const productCard = document.getElementById('product-card');

    // カメラ起動後にローディングを消す
    setTimeout(() => {
      loadingScreen.classList.add('hidden');
    }, 2800);

    // マーカー検出時
    const scene = document.querySelector('a-scene');
    scene.addEventListener('loaded', () => {
      const target = document.querySelector('[mindar-image-target]');

      target.addEventListener('targetFound', () => {
        scanHint.classList.add('hidden');
        productCard.classList.add('visible');

        // 商品情報を表示
        const info = products[0];
        document.getElementById('product-name').textContent = info.name;
        document.getElementById('product-desc').textContent = info.desc;
      });

      target.addEventListener('targetLost', () => {
        scanHint.classList.remove('hidden');
        productCard.classList.remove('visible');
      });
    });
  </script>
</body>
</html>
